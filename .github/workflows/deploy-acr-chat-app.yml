name: Deploy Chat App Image to ACR

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/deploy-acr-chat-app.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: chat-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create src/.env from secret
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}
        run: |
          echo "$ENV" > src/.env

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push image
        shell: bash
        run: |
          docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest src
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
