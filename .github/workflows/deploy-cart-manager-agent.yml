name: Deploy Cart Manager Agent

on:
  push:
    branches:
      - main
    paths:
      - "src/app/agents/cartManagerAgent_initializer.py"
      - "src/prompts/CartManagerPrompt.txt"
      - "src/app/agents/agent_initializer.py"
      - "src/app/agents/agent_processor.py"
      - ".github/workflows/deploy-cart-manager-agent.yml"
  workflow_dispatch:

jobs:
  deploy-cart-manager:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create src/.env from secret
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}
        run: |
          echo "$ENV" > src/.env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy cart manager agent
        shell: bash
        run: |
          cd src
          python app/agents/cartManagerAgent_initializer.py
